<html>
<head>
    <title>Personality Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>What Type of Person Are You?</h1>

<div id="quiz">
 
<p>1. What do you prefer?</p>
<button onclick="choose('cat')">Staying in</button>
<button onclick="choose('dog')">Going out</button>

<p>2. Are you more:</p>
<button onclick="choose('owl')">Calm</button>
<button onclick="choose('dog')">Energetic</button>

<p>3. Favorite hobby? </p>
<button onclick="choose('cat')">Reading/chilling</button>
<button onclick="choose('dog')">Sports/being active</button>

<p>4. Favorite time of day?</p>
<button onclick="choose('owl')">Night</button>
<button onclick="choose('dog')">Morning</button>

<p>5. Would you prefer hanging out in a:</p>
<button onclick="choose('cat')">Small group</button>
<button onclick="choose('dog')">Big crowd</button>

<p>6. Pick a food:</p>
<button onclick="choose('fox')">Something interesting/new</button>
<button onclick="choose('dog')">Comfort food</button>

<p>7. How do you handle problems?</p>
<button onclick="choose('fox')">Think creatively</button>
<button onclick="choose('owl')">Think carefully</button>

<p>8. What sounds more fun?</p>
<button onclick="choose('dog')">Hanging out with friends</button>
<button onclick="choose('cat')">Having alone time</button>

<p>9. Your personality is more:</p>
<button onclick="choose('fox')">Curious and clever</button>
<button onclick="choose('owl')">Quiet and observant</button>

<p>10. Pick one:</p>
<button onclick="choose('cat')">Cozy and relaxed</button>
<button onclick="choose('fox')">Adventurous and unpredictable</button>

</div>

<button onclick="result()">See Result</button>

<h2 id="output"></h2>

<script src="script.js"></script>

</body>
</html>
